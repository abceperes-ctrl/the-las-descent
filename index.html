<!-- Skeleton loader mientras carga -->
<div id="skeletonLoader" class="app" style="padding:14px">
  <div style="height:50px;background:var(--card);border-radius:10px;margin-bottom:16px;animation:shimmer 1.4s infinite"></div>
  <div style="height:90px;background:var(--card);border-radius:14px;margin-bottom:12px;animation:shimmer 1.4s infinite .1s"></div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px">
    <div style="height:72px;background:var(--card);border-radius:10px;animation:shimmer 1.4s infinite .15s"></div>
    <div style="height:72px;background:var(--card);border-radius:10px;animation:shimmer 1.4s infinite .2s"></div>
    <div style="height:72px;background:var(--card);border-radius:10px;animation:shimmer 1.4s infinite .25s"></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
    <div style="height:72px;background:var(--card);border-radius:10px;animation:shimmer 1.4s infinite .3s"></div>
    <div style="height:72px;background:var(--card);border-radius:10px;animation:shimmer 1.4s infinite .35s"></div>
    <div style="height:72px;background:var(--card);border-radius:10px;animation:shimmer 1.4s infinite .4s"></div>
    <div style="height:72px;background:var(--card);border-radius:10px;animation:shimmer 1.4s infinite .45s"></div>
  </div>
  <div style="height:110px;background:var(--card);border-radius:14px;animation:shimmer 1.4s infinite .5s"></div>
</div>
